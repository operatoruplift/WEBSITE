name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel redundant runs on the same ref so a rapid-fire push queue
# doesn't back up the runner.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # pnpm before setup-node so we can use the cache that pnpm installs
      # into. setup-node's cache: pnpm requires pnpm to already be on PATH.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build must pass. The Next.js build is the authoritative gate
      # for "does the app compile + route-generate cleanly?"
      - name: Build
        run: pnpm build

      # grep-guards (copy-check, capability-check, trust-gate) routed
      # through scripts/check.mjs. Blocking on master.
      - name: Run grep-guards
        run: pnpm check

      - name: Install Playwright browsers (chromium)
        run: pnpm exec playwright install chromium --with-deps

      # Hermetic Playwright specs. Only the network-free specs run here.
      # Specs that need real tokens (bypass, paywall, x402-gate,
      # capability/*) are kept out — they live in a separate workflow
      # with secrets.
      #
      # Two halves below: the original 17 e2e specs that exercise the
      # dev-server URL contract, and the 17 unit-style specs added in
      # PRs #254-#271 that import lib/ modules directly.
      - name: Run hermetic Playwright specs
        id: hermetic_tests
        continue-on-error: true
        run: |
          pnpm exec playwright test \
            tests/e2e/helpers.spec.ts \
            tests/e2e/copy-check.spec.ts \
            tests/e2e/capability-check.spec.ts \
            tests/e2e/trust-gate.spec.ts \
            tests/e2e/check-orchestrator.spec.ts \
            tests/e2e/health-adapters.spec.ts \
            tests/e2e/magicblock-honest-status.spec.ts \
            tests/e2e/consumer-copy.spec.ts \
            tests/e2e/chat-honesty.spec.ts \
            tests/e2e/dashboard-honesty.spec.ts \
            tests/e2e/request-id-runtime.spec.ts \
            tests/e2e/agents-store.spec.ts \
            tests/e2e/download-cta.spec.ts \
            tests/e2e/demo-flow.spec.ts \
            tests/e2e/photon-webhook.spec.ts \
            tests/e2e/toolSafety.spec.ts \
            tests/e2e/auth-diagnoseJws.spec.ts \
            tests/e2e/safeLog.spec.ts \
            tests/e2e/errorTaxonomy.spec.ts \
            tests/e2e/cannedReplies.spec.ts \
            tests/e2e/subscription-bypass.spec.ts \
            tests/e2e/rateLimit.spec.ts \
            tests/e2e/oauth-state.spec.ts \
            tests/e2e/x402-pricing-invoices.spec.ts \
            tests/e2e/apiHelpers.spec.ts \
            tests/e2e/solana-pay-builders.spec.ts \
            tests/e2e/photon-adapter.spec.ts \
            tests/e2e/magicblock-adapter.spec.ts \
            tests/e2e/flags.spec.ts \
            tests/e2e/google-oauth-consent.spec.ts \
            tests/e2e/llm-isRetryable.spec.ts \
            tests/e2e/sns.spec.ts \
            tests/e2e/receipts-verify.spec.ts \
            tests/e2e/llm-provider-status.spec.ts \
            tests/e2e/x402-client.spec.ts \
            tests/e2e/agent-registration.spec.ts \
            tests/e2e/gmail-builders.spec.ts \
            tests/e2e/llm-mapModelId.spec.ts \
            tests/e2e/photon-send.spec.ts \
            tests/e2e/calendar-toEvent.spec.ts \
            tests/e2e/gmail-message-mappers.spec.ts \
            tests/e2e/llm-streamToString.spec.ts \
            tests/e2e/capabilities-hasServerLLMKey.spec.ts \
            tests/e2e/toolCalls-parsers.spec.ts \
            tests/e2e/llmHealth-prefix.spec.ts \
            tests/e2e/toolCalls-formatToolResult.spec.ts \
            tests/e2e/toolCalls-humanizeToolError.spec.ts \
            tests/e2e/x402Gate-free.spec.ts \
            --reporter=list

      - name: Upload Playwright report on failure
        if: steps.hermetic_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Fail job if hermetic tests failed
        if: steps.hermetic_tests.outcome == 'failure'
        run: exit 1

  lint:
    name: lint (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Lint is informational on master today. 70 pre-existing errors
      # from the pre-W1B period are documented in PR #131. The step
      # continues-on-error so CI status stays green until those are
      # retrofitted in a separate multi-PR cleanup. Still runs so the
      # delta is visible in the run log.
      - name: ESLint (non-blocking)
        run: pnpm lint
        continue-on-error: true
